<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="人员信息管理应用">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="人员管理">
    
    <title>人员信息管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 下载进度提示 -->
    <div id="install-progress" style="display: none;">
        <div class="progress-text">
            📥 <span id="progress-status">正在缓存应用文件到你的手机...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div style="font-size: 12px; margin-top: 5px;">
            <span id="progress-percent">0%</span> - <span id="progress-info">准备中...</span>
        </div>
    </div>

    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">👥 人员信息管理</div>
            <div class="nav-links">
                <button class="nav-btn active" data-screen="input">➕ 输入</button>
                <button class="nav-btn" data-screen="list">📋 列表</button>
                <button class="nav-btn" data-screen="search">🔍 搜索</button>
                <button id="install-btn" class="nav-btn" style="display: none; background: #4CAF50;">⬇️ 安装</button>
            </div>
        </nav>

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 屏幕1: 输入界面 -->
            <div id="input-screen" class="screen active">
                <h2>📝 输入人员信息</h2>
                <form id="input-form">
                    <div class="form-group">
                        <label for="name">姓名 *</label>
                        <input type="text" id="name" name="name" required placeholder="请输入姓名">
                    </div>

                    <div class="form-group">
                        <label>店铺挡位 *</label>
                        <div class="checkbox-group" id="shop-level-group">
                            <label class="checkbox-label"><input type="checkbox" name="shopLevel" value="3千以下"> 3千以下</label>
                            <label class="checkbox-label"><input type="checkbox" name="shopLevel" value="3千-4千"> 3千-4千</label>
                            <label class="checkbox-label"><input type="checkbox" name="shopLevel" value="4千-6千"> 4千-6千</label>
                            <label class="checkbox-label"><input type="checkbox" name="shopLevel" value="6千以上"> 6千以上</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="skill-level">行业熟练程度 *</label>
                        <select id="skill-level" name="skill-level" required>
                            <option value="">选择熟练程度...</option>
                            <option value="小白">小白</option>
                            <option value="略熟悉">略熟悉</option>
                            <option value="老手">老手</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>地址</label>
                        <div class="checkbox-group" id="address-group">
                            <label class="checkbox-label"><input type="checkbox" name="address" value="广佛"> 广佛</label>
                            <label class="checkbox-label"><input type="checkbox" name="address" value="东莞惠州"> 东莞惠州</label>
                            <label class="checkbox-label"><input type="checkbox" name="address" value="全深圳"> 全深圳</label>
                            <label class="checkbox-label"><input type="checkbox" name="address" value="龙岗"> 龙岗</label>
                            <label class="checkbox-label"><input type="checkbox" name="address" value="龙华"> 龙华</label>
                            <label class="checkbox-label"><input type="checkbox" name="address" value="宝安"> 宝安</label>
                            <label class="checkbox-label"><input type="checkbox" name="address" value="珠三角"> 珠三角</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="shop-type">店铺种类</label>
                        <select id="shop-type" name="shop-type">
                            <option value="">选择店铺种类...</option>
                            <option value="零食店">零食店</option>
                            <option value="空铺">空铺</option>
                            <option value="成品店">成品店</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="willingness">意愿程度 *</label>
                        <select id="willingness" name="willingness" required>
                            <option value="">选择意愿程度...</option>
                            <option value="未联系">未联系</option>
                            <option value="意愿低">意愿低</option>
                            <option value="洽谈中">洽谈中</option>
                            <option value="意愿高">意愿高</option>
                            <option value="已签约">已签约</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="note">备注</label>
                        <textarea id="note" name="note" maxlength="200" placeholder="请输入备注信息（最多200字）" rows="3"></textarea>
                        <span class="char-count"><span id="note-count">0</span>/200</span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">✅ 保存</button>
                        <button type="reset" class="btn btn-secondary">🔄 清空</button>
                    </div>
                </form>
            </div>

            <!-- 屏幕2: 列表界面 -->
            <div id="list-screen" class="screen">
                <h2>📋 信息总览</h2>
                <div id="list-stats" class="stats-bar">
                    总人数: <span id="total-count">0</span>
                </div>
                <div class="backup-bar">
                    <button class="btn btn-backup" onclick="exportData()">💾 备份数据</button>
                    <button class="btn btn-restore" onclick="triggerImport()">📥 恢复数据</button>
                    <input type="file" id="import-file-input" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
                <div class="table-wrapper">
                    <table id="data-table" class="data-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>姓名</th>
                                <th>店铺</th>
                                <th>熟练度</th>
                                <th>地址</th>
                                <th>店铺种类</th>
                                <th>意愿</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="9" class="empty-message">暂无数据</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 屏幕3: 搜索界面 -->
            <div id="search-screen" class="screen">
                <h2>🔍 搜索信息</h2>
                <div class="search-filters">
                    <div class="filter-group">
                        <label for="search-name">按姓名搜索</label>
                        <input type="text" id="search-name" placeholder="输入姓名">
                    </div>

                    <div class="filter-group">
                        <label for="search-shop">按店铺挡位搜索</label>
                        <select id="search-shop">
                            <option value="">所有店铺挡位</option>
                            <option value="3千以下">3千以下</option>
                            <option value="3千-4千">3千-4千</option>
                            <option value="4千-6千">4千-6千</option>
                            <option value="6千以上">6千以上</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="search-skill">按熟练程度搜索</label>
                        <select id="search-skill">
                            <option value="">所有熟练程度</option>
                            <option value="小白">小白</option>
                            <option value="略熟悉">略熟悉</option>
                            <option value="老手">老手</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="search-address">按地址搜索</label>
                        <select id="search-address">
                            <option value="">所有地址</option>
                            <option value="广佛">广佛</option>
                            <option value="东莞惠州">东莞惠州</option>
                            <option value="全深圳">全深圳</option>
                            <option value="龙岗">龙岗</option>
                            <option value="龙华">龙华</option>
                            <option value="宝安">宝安</option>
                            <option value="珠三角">珠三角</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="search-shop-type">按店铺种类搜索</label>
                        <select id="search-shop-type">
                            <option value="">所有店铺种类</option>
                            <option value="零食店">零食店</option>
                            <option value="空铺">空铺</option>
                            <option value="成品店">成品店</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="search-willingness">按意愿程度搜索</label>
                        <select id="search-willingness">
                            <option value="">所有意愿程度</option>
                            <option value="未联系">未联系</option>
                            <option value="意愿低">意愿低</option>
                            <option value="洽谈中">洽谈中</option>
                            <option value="意愿高">意愿高</option>
                            <option value="已签约">已签约</option>
                        </select>
                    </div>

                    <div class="filter-actions">
                        <button class="btn btn-primary" id="search-btn">🔍 搜索</button>
                        <button class="btn btn-secondary" id="clear-search-btn">🔄 清空</button>
                    </div>
                </div>

                <div id="search-results" class="search-results" style="display: none;">
                    <h3>搜索结果 (<span id="result-count">0</span>)</h3>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>姓名</th>
                                    <th>店铺</th>
                                    <th>熟练度</th>
                                    <th>地址</th>
                                    <th>店铺种类</th>
                                    <th>意愿</th>
                                    <th>备注</th>
                                </tr>
                            </thead>
                            <tbody id="search-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="no-results" class="message" style="display: none;">
                    没有找到符合条件的结果
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    
    <!-- PWA Service Worker 注册 -->
    <script>
        function showProgress() {
            const progressDiv = document.getElementById('install-progress');
            if (progressDiv) {
                progressDiv.classList.add('show');
            }
        }

        function hideProgress() {
            const progressDiv = document.getElementById('install-progress');
            if (progressDiv) {
                progressDiv.classList.remove('show');
            }
        }

        function updateProgress(progress, current, total) {
            const fill = document.getElementById('progress-fill');
            const percent = document.getElementById('progress-percent');
            const info = document.getElementById('progress-info');
            const status = document.getElementById('progress-status');

            if (fill) fill.style.width = progress + '%';
            if (percent) percent.textContent = progress + '%';
            if (info) info.textContent = `${current}/${total} 文件`;
            
            if (progress === 100) {
                if (status) status.textContent = '✅ 应用已完全缓存！';
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.onmessage = (event) => {
                const data = event.data;
                if (data.type === 'CACHE_PROGRESS') {
                    console.log(`📦 缓存进度: ${data.progress}%`);
                    updateProgress(data.progress, data.current, data.total);
                } else if (data.type === 'CACHE_COMPLETE') {
                    console.log('✅ 缓存完成');
                    updateProgress(100, 5, 5);
                    hideProgress();
                } else if (data.type === 'CACHE_STATUS') {
                    // SW 回复：已在缓存中
                    console.log('📦 应用已在缓存中，无需重新下载');
                    hideProgress();
                }
            };

            // 安全兜底：最多 5 秒后自动隐藏进度条
            let progressTimeout = setTimeout(() => {
                console.log('⏰ 进度条超时，自动隐藏');
                hideProgress();
            }, 5000);

            window.addEventListener('load', () => {
                showProgress();

                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'GET_CACHE_STATUS'
                    });
                }

                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker 注册成功');

                        // 如果 SW 没有在安装（已经缓存过），直接隐藏进度条
                        if (!registration.installing && !registration.waiting) {
                            // 给 SW 一点时间回复缓存状态
                            setTimeout(() => {
                                if (document.getElementById('install-progress').classList.contains('show')) {
                                    console.log('📦 SW 已就绪，隐藏进度条');
                                    hideProgress();
                                    clearTimeout(progressTimeout);
                                }
                            }, 1500);
                        }
                    })
                    .catch(error => {
                        console.log('⚠️ Service Worker 注册失败');
                        hideProgress();
                        clearTimeout(progressTimeout);
                    });
            });
        } else {
            hideProgress();
        }

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) {
                installBtn.style.display = 'block';
            }
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    installBtn.style.display = 'none';
                }
            });
        }

        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA 已安装');
            hideProgress();
        });
    </script>
</body>
</html>
