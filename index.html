<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="人员信息管理应用">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="人员管理">
    
    <title>人员信息管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 更新提示横幅 -->
    <div id="update-banner" style="display:none;">
        <span>🔄 新版本可用</span>
        <button id="update-btn" onclick="doUpdate()">立即更新</button>
    </div>

    <!-- 下载进度提示 -->
    <div id="install-progress" style="display: none !important;">
        <div class="progress-text">
            📥 <span id="progress-status">正在缓存应用文件到你的手机...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div style="font-size: 12px; margin-top: 5px;">
            <span id="progress-percent">0%</span> - <span id="progress-info">准备中...</span>
        </div>
    </div>

    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">👥 人员信息管理</div>
            <div class="nav-links">
                <button class="nav-btn active" data-screen="input">➕ 输入</button>
                <button class="nav-btn" data-screen="list">📋 列表</button>
                <button class="nav-btn" data-screen="search">🔍 搜索</button>
                <button id="backup-btn" class="nav-btn nav-btn-backup" onclick="exportData()">💾 备份</button>
                <button id="restore-btn" class="nav-btn nav-btn-restore" onclick="triggerImport()">📥 恢复</button>
                <button id="install-btn" class="nav-btn" style="display: none; background: #4CAF50;">⬇️ 安装</button>
            </div>
        </nav>

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 屏幕1: 输入界面 -->
            <div id="input-screen" class="screen active">
                <h2>📝 输入人员信息</h2>
                <form id="input-form">
                    <div class="form-group">
                        <label for="name">姓名 *</label>
                        <input type="text" id="name" name="name" required placeholder="请输入姓名">
                    </div>

                    <div class="form-group">
                        <label for="shop-level">店铺挡位 *</label>
                        <select id="shop-level" name="shop-level" required>
                            <option value="">选择店铺挡位...</option>
                            <option value="3千以下">3千以下</option>
                            <option value="3千-5千">3千-5千</option>
                            <option value="6千-9千">6千-9千</option>
                            <option value="1万及以上">1万及以上</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="skill-level">行业熟练程度 *</label>
                        <select id="skill-level" name="skill-level" required>
                            <option value="">选择熟练程度...</option>
                            <option value="小白">小白</option>
                            <option value="略熟悉">略熟悉</option>
                            <option value="老手">老手</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="age">年龄 *</label>
                        <select id="age" name="age" required>
                            <option value="">选择年龄段...</option>
                            <option value="30以下">30以下</option>
                            <option value="30-35">30-35</option>
                            <option value="35-40">35-40</option>
                            <option value="40-45">40-45</option>
                            <option value="45-50">45-50</option>
                            <option value="50-55">50-55</option>
                            <option value="55-60">55-60</option>
                            <option value="60以上">60以上</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="willingness">意愿程度 *</label>
                        <select id="willingness" name="willingness" required>
                            <option value="">选择意愿程度...</option>
                            <option value="非常低">非常低</option>
                            <option value="较低">较低</option>
                            <option value="一般">一般</option>
                            <option value="较高">较高</option>
                            <option value="非常高">非常高</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="follow-status">跟进状态</label>
                        <select id="follow-status" name="follow-status">
                            <option value="">选择跟进状态...</option>
                            <option value="未联系">未联系</option>
                            <option value="已联系意向低">已联系意向低</option>
                            <option value="沟通中">沟通中</option>
                            <option value="已签约">已签约</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="notes">备注</label>
                        <textarea id="notes" name="notes" rows="3" placeholder="自由填写备注信息..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">✅ 保存</button>
                        <button type="reset" class="btn btn-secondary">🔄 清空</button>
                    </div>
                </form>
            </div>

            <!-- 屏幕2: 列表界面 -->
            <div id="list-screen" class="screen">
                <h2>📋 信息总览</h2>
                <div id="list-stats" class="stats-bar">
                    总人数: <span id="total-count">0</span>
                    <span class="sort-indicator" id="sort-info"></span>
                </div>
                <div class="table-wrapper">
                    <table id="data-table" class="data-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>姓名</th>
                                <th>店铺</th>
                                <th>熟练度</th>
                                <th class="sortable" onclick="toggleSort('age')">年龄 <span class="sort-arrow" id="sort-age"></span></th>
                                <th class="sortable" onclick="toggleSort('willingness')">意愿 <span class="sort-arrow" id="sort-willingness"></span></th>
                                <th>跟进状态</th>
                                <th>备注</th>
                                <th class="sortable" onclick="toggleSort('time')">时间 <span class="sort-arrow" id="sort-time"></span></th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr>
                                <td colspan="9" class="empty-message">暂无数据</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 屏幕3: 搜索界面 -->
            <div id="search-screen" class="screen">
                <h2>🔍 搜索信息</h2>
                <div class="search-filters">
                    <div class="filter-group">
                        <label for="search-name">按姓名搜索</label>
                        <input type="text" id="search-name" placeholder="输入姓名">
                    </div>

                    <div class="filter-group">
                        <label>按年龄筛选（可多选）</label>
                        <div class="checkbox-group" id="search-age-group">
                            <label class="checkbox-label"><input type="checkbox" value="30以下"> 30以下</label>
                            <label class="checkbox-label"><input type="checkbox" value="30-35"> 30-35</label>
                            <label class="checkbox-label"><input type="checkbox" value="35-40"> 35-40</label>
                            <label class="checkbox-label"><input type="checkbox" value="40-45"> 40-45</label>
                            <label class="checkbox-label"><input type="checkbox" value="45-50"> 45-50</label>
                            <label class="checkbox-label"><input type="checkbox" value="50-55"> 50-55</label>
                            <label class="checkbox-label"><input type="checkbox" value="55-60"> 55-60</label>
                            <label class="checkbox-label"><input type="checkbox" value="60以上"> 60以上</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>按店铺挡位筛选（可多选）</label>
                        <div class="checkbox-group" id="search-shop-group">
                            <label class="checkbox-label"><input type="checkbox" value="3千以下"> 3千以下</label>
                            <label class="checkbox-label"><input type="checkbox" value="3千-5千"> 3千-5千</label>
                            <label class="checkbox-label"><input type="checkbox" value="6千-9千"> 6千-9千</label>
                            <label class="checkbox-label"><input type="checkbox" value="1万及以上"> 1万及以上</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>按熟练程度筛选（可多选）</label>
                        <div class="checkbox-group" id="search-skill-group">
                            <label class="checkbox-label"><input type="checkbox" value="小白"> 小白</label>
                            <label class="checkbox-label"><input type="checkbox" value="略熟悉"> 略熟悉</label>
                            <label class="checkbox-label"><input type="checkbox" value="老手"> 老手</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>按意愿程度筛选（可多选）</label>
                        <div class="checkbox-group" id="search-willingness-group">
                            <label class="checkbox-label"><input type="checkbox" value="非常低"> 非常低</label>
                            <label class="checkbox-label"><input type="checkbox" value="较低"> 较低</label>
                            <label class="checkbox-label"><input type="checkbox" value="一般"> 一般</label>
                            <label class="checkbox-label"><input type="checkbox" value="较高"> 较高</label>
                            <label class="checkbox-label"><input type="checkbox" value="非常高"> 非常高</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>按跟进状态筛选（可多选）</label>
                        <div class="checkbox-group" id="search-status-group">
                            <label class="checkbox-label"><input type="checkbox" value="未联系"> 未联系</label>
                            <label class="checkbox-label"><input type="checkbox" value="已联系意向低"> 已联系意向低</label>
                            <label class="checkbox-label"><input type="checkbox" value="沟通中"> 沟通中</label>
                            <label class="checkbox-label"><input type="checkbox" value="已签约"> 已签约</label>
                        </div>
                    </div>

                    <div class="filter-actions">
                        <button class="btn btn-primary" id="search-btn">🔍 搜索</button>
                        <button class="btn btn-secondary" id="clear-search-btn">🔄 清空</button>
                    </div>
                </div>

                <div id="search-results" class="search-results" style="display: none;">
                    <h3>搜索结果 (<span id="result-count">0</span>)</h3>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>姓名</th>
                                    <th>店铺</th>
                                    <th>熟练度</th>
                                    <th>年龄</th>
                                    <th>意愿</th>
                                    <th>跟进状态</th>
                                    <th>备注</th>
                                    <th>时间 <span class="sort-arrow" id="sort-search-time" style="cursor:pointer;" onclick="toggleSearchSort()"></span></th>
                                </tr>
                            </thead>
                            <tbody id="search-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="no-results" class="message" style="display: none;">
                    没有找到符合条件的结果
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件导入 input -->
    <input type="file" id="import-file-input" accept=".json" style="display: none;" onchange="importData(event)">

    <script src="app.js?v=5"></script>

    <!-- 导入确认弹窗 -->
    <div id="import-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-title">📥 发现备份文件</div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-merge" id="modal-merge">合并</button>
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
            </div>
        </div>
    </div>
    
    <!-- PWA Service Worker 注册 -->
    <script>
        function showProgress() {
            const progressDiv = document.getElementById('install-progress');
            if (progressDiv) {
                progressDiv.classList.add('show');
            }
        }

        function hideProgress() {
            const progressDiv = document.getElementById('install-progress');
            if (progressDiv) {
                progressDiv.classList.remove('show');
            }
        }

        function updateProgress(progress, current, total) {
            const fill = document.getElementById('progress-fill');
            const percent = document.getElementById('progress-percent');
            const info = document.getElementById('progress-info');
            const status = document.getElementById('progress-status');

            if (fill) fill.style.width = progress + '%';
            if (percent) percent.textContent = progress + '%';
            if (info) info.textContent = `${current}/${total} 文件`;
            
            if (progress === 100) {
                if (status) status.textContent = '✅ 应用已完全缓存！';
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                showProgress();

                if ('controller' in navigator) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'GET_CACHE_STATUS'
                    });
                }

                navigator.serviceWorker.onmessage = (event) => {
                    const data = event.data;
                    
                    if (data.type === 'CACHE_PROGRESS') {
                        console.log('📦 缓存进度: ' + data.progress + '%');
                        updateProgress(data.progress, data.current, data.total);
                    } else if (data.type === 'CACHE_COMPLETE') {
                        console.log('✅ 缓存完成');
                        updateProgress(100, 5, 5);
                        hideProgress();
                    } else if (data.type === 'UPDATE_READY') {
                        // 显示更新提示
                        var banner = document.getElementById('update-banner');
                        if (banner) banner.style.display = 'flex';
                    }
                };

                // 检查是否有更新
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker 注册成功');
                        registration.addEventListener('updatefound', () => {
                            console.log('🔄 发现新版本，正在下载...');
                        });
                    })
                    .catch(error => {
                        console.log('⚠️ Service Worker 注册失败');
                        hideProgress();
                    });
            });
        } else {
            hideProgress();
        }

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) {
                installBtn.style.display = 'block';
            }
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    installBtn.style.display = 'none';
                }
            });
        }

        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA 已安装');
            hideProgress();
        });

        // 执行更新：重新加载页面
        function doUpdate() {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
            }
            window.location.reload();
        }
    </script>
</body>
</html>
